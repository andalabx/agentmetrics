server {
    listen 3099;
    root /usr/share/nginx/html;
    index index.html;

    # SPA fallback — all client-side routes serve index.html
    location / {
        try_files $uri $uri/ /index.html;

        # HTML: no cache (must revalidate so new deployments are picked up immediately)
        add_header Cache-Control "no-cache, must-revalidate";
    }

    # Hashed static assets (JS/CSS/fonts) — cache aggressively, Vite adds content hash to filenames
    location ~* \.(js|css|woff2?|ttf|eot|otf)$ {
        expires 1y;
        add_header Cache-Control "public, immutable, max-age=31536000";
        try_files $uri =404;
    }

    # Images and icons
    location ~* \.(png|jpg|jpeg|gif|svg|ico|webp)$ {
        expires 30d;
        add_header Cache-Control "public, max-age=2592000";
        try_files $uri =404;
    }

    # Proxy API calls to backend (Docker service name: api)
    location /v1/ {
        proxy_pass http://api:8099/v1/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location = /health {
        proxy_pass http://api:8099/health;
        proxy_set_header Host $host;
    }

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml image/svg+xml;
    gzip_min_length 1024;
}
