name: Publish packages to PyPI and npm

on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  build:
    name: Build all packages
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4
      - uses: actions/setup-python@0b93645e9fea7318ecaed2b359559ac225c90a2b  # v5
        with:
          python-version: "3.12"
      - run: pip install build
      - name: Build all packages
        run: |
          python -m build packages/shared/python
          python -m build packages/python
          python -m build api
          python -m build packages/integrations/anthropic
          python -m build packages/integrations/autogen
          python -m build packages/integrations/crewai
          python -m build packages/integrations/langchain
          python -m build packages/integrations/llamaindex
          python -m build packages/integrations/openai-agents
          python -m build packages/integrations/hermes
      - uses: actions/upload-artifact@v6
        with:
          name: dists
          path: |
            packages/shared/python/dist/
            packages/python/dist/
            api/dist/
            packages/integrations/*/dist/

  publish-agentmetrics:
    needs: build
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v7
        with: { name: dists, path: dists/ }
      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dists/packages/python/dist/
          skip-existing: true

  publish-server:
    needs: build
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v7
        with: { name: dists, path: dists/ }
      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dists/api/dist/
          skip-existing: true

  publish-anthropic:
    needs: build
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v7
        with: { name: dists, path: dists/ }
      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dists/packages/integrations/anthropic/dist/
          skip-existing: true

  publish-autogen:
    needs: build
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v7
        with: { name: dists, path: dists/ }
      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dists/packages/integrations/autogen/dist/
          skip-existing: true

  publish-crewai:
    needs: build
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v7
        with: { name: dists, path: dists/ }
      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dists/packages/integrations/crewai/dist/
          skip-existing: true

  publish-langchain:
    needs: build
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v7
        with: { name: dists, path: dists/ }
      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dists/packages/integrations/langchain/dist/
          skip-existing: true

  publish-llamaindex:
    needs: build
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v7
        with: { name: dists, path: dists/ }
      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dists/packages/integrations/llamaindex/dist/
          skip-existing: true

  publish-openai-agents:
    needs: build
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v7
        with: { name: dists, path: dists/ }
      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dists/packages/integrations/openai-agents/dist/
          skip-existing: true

  publish-shared:
    needs: build
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v7
        with: { name: dists, path: dists/ }
      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dists/packages/shared/python/dist/
          skip-existing: true

  publish-hermes:
    needs: build
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v7
        with: { name: dists, path: dists/ }
      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dists/packages/integrations/hermes/dist/
          skip-existing: true

  build-npm:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @agentmetrics/core build
      - run: pnpm --filter agentmetrics build
      - run: pnpm --filter agentmetrics-anthropic build
      - run: pnpm --filter agentmetrics-langchain build
      - run: npm install --prefix packages/integrations/openclaw && npm run build --prefix packages/integrations/openclaw
      - uses: actions/upload-artifact@v6
        with:
          name: npm-dists
          path: |
            packages/js/dist/
            packages/integrations/anthropic-js/dist/
            packages/integrations/langchain-js/dist/
            packages/integrations/openclaw/dist/

  publish-npm-agentmetrics:
    needs: build-npm
    runs-on: ubuntu-latest
    environment: npm
    permissions:
      id-token: write
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"
      - run: npm install -g npm@latest
      - uses: actions/download-artifact@v7
        with: { name: npm-dists, path: . }
      - run: npm publish packages/js --provenance --access public

  publish-npm-anthropic:
    needs: build-npm
    runs-on: ubuntu-latest
    environment: npm
    permissions:
      id-token: write
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"
      - run: npm install -g npm@latest
      - uses: actions/download-artifact@v7
        with: { name: npm-dists, path: . }
      - run: npm publish packages/integrations/anthropic-js --provenance --access public

  publish-npm-langchain:
    needs: build-npm
    runs-on: ubuntu-latest
    environment: npm
    permissions:
      id-token: write
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"
      - run: npm install -g npm@latest
      - uses: actions/download-artifact@v7
        with: { name: npm-dists, path: . }
      - run: npm publish packages/integrations/langchain-js --provenance --access public

  publish-npm-openclaw:
    needs: build-npm
    runs-on: ubuntu-latest
    environment: npm
    permissions:
      id-token: write
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"
      - run: npm install -g npm@latest
      - uses: actions/download-artifact@v7
        with: { name: npm-dists, path: . }
      - run: npm publish packages/integrations/openclaw --provenance --access public
