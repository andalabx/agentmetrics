# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json
name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:

  # ── API ─────────────────────────────────────────────────────────────────────

  api-lint:
    name: "API - lint"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4
      - uses: actions/setup-python@0b93645e9fea7318ecaed2b359559ac225c90a2  # v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install ruff
      - run: ruff check api/

  api-test:
    name: "API - tests"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4
      - uses: actions/setup-python@0b93645e9fea7318ecaed2b359559ac225c90a2  # v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: api/requirements.txt
      - name: Install dependencies
        working-directory: api
        run: pip install -r requirements.txt
      - name: Run tests
        working-directory: api
        env:
          DATABASE_URL: sqlite:///./test.db
        run: pytest tests/ -v --tb=short

  # ── SDK and integrations ─────────────────────────────────────────────────────

  sdk-python-lint:
    name: "SDK Python - lint"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4
      - uses: actions/setup-python@0b93645e9fea7318ecaed2b359559ac225c90a2  # v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install ruff
      - run: ruff check packages/python/ packages/integrations/

  # ── Dashboard ────────────────────────────────────────────────────────────────

  dashboard:
    name: "Dashboard - build"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4
      - uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af  # v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: dashboard/package-lock.json
      - name: Install dependencies
        working-directory: dashboard
        run: npm ci
      - name: Lint
        working-directory: dashboard
        run: npm run lint
      - name: Build
        working-directory: dashboard
        run: npm run build

  # ── Docker ───────────────────────────────────────────────────────────────────

  docker:
    name: "Docker - build images"
    needs: [api-lint, api-test, dashboard]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4
      - name: Validate Docker Compose
        run: docker compose config --quiet
      - name: Build API image
        run: docker build api/ -t agentmetrics-api:ci
      - name: Build dashboard image
        run: docker build dashboard/ -t agentmetrics-dashboard:ci
