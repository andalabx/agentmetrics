# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json
name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:

  # ── API ─────────────────────────────────────────────────────────────────────

  api-lint:
    name: "API - lint"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4
      - uses: actions/setup-python@0b93645e9fea7318ecaed2b359559ac225c90a2  # v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install ruff
      - run: ruff check api/

  api-test:
    name: "API - tests (SQLite)"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4
      - uses: actions/setup-python@0b93645e9fea7318ecaed2b359559ac225c90a2  # v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: api/requirements.txt
      - name: Install dependencies
        working-directory: api
        run: pip install -r requirements.txt
      - name: Run tests
        working-directory: api
        env:
          DATABASE_URL: sqlite:///./test.db
        run: pytest tests/ -v --tb=short

  api-test-postgres:
    name: "API - tests (PostgreSQL)"
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: agentmetrics
          POSTGRES_PASSWORD: testpass
          POSTGRES_DB: agentmetrics
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4
      - uses: actions/setup-python@0b93645e9fea7318ecaed2b359559ac225c90a2  # v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: api/requirements.txt
      - name: Install dependencies
        working-directory: api
        run: pip install -r requirements.txt psycopg2-binary
      - name: Run tests
        working-directory: api
        env:
          DATABASE_URL: postgresql://agentmetrics:testpass@localhost:5432/agentmetrics
        run: pytest tests/ -v --tb=short

  # ── SDK and integrations ─────────────────────────────────────────────────────

  sdk-python-lint:
    name: "SDK Python - lint"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4
      - uses: actions/setup-python@0b93645e9fea7318ecaed2b359559ac225c90a2  # v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install ruff
      - run: ruff check packages/python/ packages/integrations/

  # ── Dashboard ────────────────────────────────────────────────────────────────

  dashboard:
    name: "Dashboard - build"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4
      - uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af  # v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: dashboard/package-lock.json
      - name: Install dependencies
        working-directory: dashboard
        run: npm ci
      - name: Lint
        working-directory: dashboard
        run: npm run lint
      - name: Build
        working-directory: dashboard
        run: npm run build

  # ── Docker ───────────────────────────────────────────────────────────────────

  docker:
    name: "Docker - build images"
    needs: [api-lint, api-test, dashboard]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4
      - name: Validate Docker Compose
        run: docker compose config --quiet
      - name: Build API image
        run: docker build api/ -t agentmetrics-api:ci
      - name: Build dashboard image
        run: docker build dashboard/ -t agentmetrics-dashboard:ci

  compose-smoke:
    name: "Compose - smoke test"
    needs: [api-lint, api-test, dashboard]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4
      - name: Start stack
        run: docker compose up -d --build --wait --timeout 120
        env:
          POSTGRES_PASSWORD: testpass
      - name: Check API responds
        run: |
          code=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:8099/v1/health)
          [ "$code" != "000" ] && echo "API: HTTP $code" || (echo "API unreachable"; exit 1)
      - name: Check dashboard responds
        run: |
          curl -sf http://localhost:3099/ > /dev/null && echo "Dashboard: OK"
      - name: Tear down
        if: always()
        run: docker compose down -v
