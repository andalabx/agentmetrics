[build-system]
requires = ["setuptools>=61,<77", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "agentmetrics"
version = "0.1.2"
description = "Monitor your AI agents. Track cost, latency, and errors in two lines of code."
readme = "README.md"
license = { text = "MIT" }
requires-python = ">=3.9"
dependencies = ["requests>=2.28"]
keywords = ["ai agent monitoring", "llm monitoring", "ai agent observability", "llm observability", "langchain monitoring", "crewai monitoring", "openai cost tracker", "llm cost tracking", "ai agent tracing", "open source llm monitoring"]
classifiers = [
    "Development Status :: 4 - Beta",
    "Intended Audience :: Developers",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.9",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
]

[project.urls]
Homepage = "https://github.com/andalabx/agentmetrics"
Repository = "https://github.com/andalabx/agentmetrics"
Documentation = "https://github.com/andalabx/agentmetrics"

[project.scripts]
agentmetrics = "agentmetrics.cli:main"

[tool.setuptools.packages.find]
where = ["."]
include = ["agentmetrics*"]
