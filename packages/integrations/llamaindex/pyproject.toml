[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "agentmetrics-llamaindex"
version = "0.2.0"
description = "AgentMetrics observability integration for LlamaIndex agents"
readme = "README.md"
license = { text = "MIT" }
requires-python = ">=3.10"
keywords = ["llamaindex", "llama-index", "agentmetrics", "observability", "ai-agents"]
dependencies = [
    "agentmetrics>=0.2.0",
    "agentmetrics-shared>=0.2.0",
    "llama-index-core>=0.11.0",
]

[project.urls]
Homepage = "https://github.com/andalabx/agentmetrics"
Repository = "https://github.com/andalabx/agentmetrics"

[tool.hatch.build.targets.wheel]
packages = ["agentmetrics_llamaindex"]

[tool.uv.sources]
agentmetrics = { workspace = true }
agentmetrics-shared = { workspace = true }
