[build-system]
requires = ["setuptools>=68.0", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "agentmetrics-hermes"
version = "0.2.0"
description = "AgentMetrics observability plugin for Hermes agents"
authors = [{ name = "AndaLabX", email = "anda@andalabx.com" }]
license = { text = "MIT" }
readme = "README.md"
requires-python = ">=3.11"
dependencies = ["agentmetrics-shared>=0.2.0"]

[project.optional-dependencies]
crypto = ["cryptography>=41.0"]
dev = [
    "pytest>=8.0",
    "pytest-cov>=5.0",
    "ruff>=0.11.0",
    "mypy>=1.10",
    "hypothesis>=6.0",
]

[project.urls]
Homepage = "https://github.com/andalabx/agentmetrics"
Repository = "https://github.com/andalabx/agentmetrics.git"

[project.entry-points."hermes_plugins"]
agentmetrics = "agentmetrics_hermes"

[tool.setuptools.packages.find]
include = ["agentmetrics_hermes*"]

[tool.setuptools.package-data]
agentmetrics_hermes = ["plugin.yaml"]

[tool.uv]
exclude-newer = "7 days"

[tool.uv.sources]
agentmetrics-shared = { workspace = true }

[tool.ruff]
target-version = "py311"
line-length = 100

[tool.ruff.lint]
select = ["E", "W", "F", "I", "B", "C4", "UP", "TID", "RUF", "PERF"]
ignore = ["E501", "B008"]

[tool.ruff.lint.per-file-ignores]
"tests/**/*.py" = ["B", "C4"]
"**/__init__.py" = ["F401"]

[tool.ruff.lint.flake8-tidy-imports]
# cryptography and hermes_cli are optional/peer deps — never ban them here

[tool.mypy]
strict = true
warn_return_any = true
warn_unused_ignores = false

[tool.pytest.ini_options]
markers = [
    "unit: no external dependencies, runs in under 1s",
    "integration: hits a real AgentMetrics API",
]
testpaths = ["tests"]
