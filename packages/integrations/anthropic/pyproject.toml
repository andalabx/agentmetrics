[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "agentmetrics-anthropic"
version = "0.1.0"
description = "AgentMetrics observability integration for Claude Managed Agents"
readme = "README.md"
license = { text = "MIT" }
requires-python = ">=3.10"
keywords = ["anthropic", "claude", "managed-agents", "agentmetrics", "observability", "ai-agents"]
dependencies = [
    "agentmetrics>=0.1.2",
    "anthropic>=0.49.0",
]

[project.urls]
Homepage = "https://github.com/andalabx/agentmetrics"
Repository = "https://github.com/andalabx/agentmetrics"

[tool.hatch.build.targets.wheel]
packages = ["agentmetrics_anthropic"]

[tool.uv.sources]
agentmetrics = { workspace = true }
