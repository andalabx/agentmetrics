# Fly.io deployment for AgentMetrics API
# Deploy with: fly launch --config fly.toml
#
# For the dashboard, deploy separately:
#   cd dashboard && fly launch

app = "agentmetrics-api"
primary_region = "iad"

[build]
  dockerfile = "api/Dockerfile"

[env]
  ENVIRONMENT = "production"

[http_service]
  internal_port = 8099
  force_https = true
  # auto_stop_machines = false keeps at least one machine running so the first
  # request after idle doesn't hit a cold start. Set to true to save cost if
  # cold starts are acceptable for your workload.
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1

  [http_service.concurrency]
    type = "connections"
    hard_limit = 25
    soft_limit = 20

[[vm]]
  memory = "512mb"
  cpu_kind = "shared"
  cpus = 1

[mounts]
  source = "agentmetrics_data"
  destination = "/app/data"
