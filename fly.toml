# Fly.io deployment for AgentMetrics API
# Deploy with: fly launch --config fly.toml
#
# For the dashboard, deploy separately:
#   cd dashboard && fly launch

app = "agentmetrics-api"
primary_region = "iad"

[build]
  dockerfile = "api/Dockerfile"
  build_target = "api"

[env]
  ENVIRONMENT = "production"
  AUTH_ENABLED = "false"

[http_service]
  internal_port = 8099
  force_https = true
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1

  [http_service.concurrency]
    type = "connections"
    hard_limit = 25
    soft_limit = 20

[[vm]]
  memory = "512mb"
  cpu_kind = "shared"
  cpus = 1

[mounts]
  source = "agentmetrics_data"
  destination = "/app/data"
