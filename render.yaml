services:
  - type: web
    name: agentmetrics-api
    runtime: docker
    dockerfilePath: ./api/Dockerfile
    dockerContext: ./api
    plan: free
    envVars:
      - key: DATABASE_URL
        value: sqlite:///./data/agentmetrics.db
      - key: ENVIRONMENT
        value: production
      - key: FRONTEND_URL
        fromService:
          name: agentmetrics-dashboard
          type: web
          property: host
    disk:
      name: api-data
      mountPath: /app/data
      sizeGB: 1

  - type: web
    name: agentmetrics-dashboard
    runtime: docker
    dockerfilePath: ./dashboard/Dockerfile
    dockerContext: ./dashboard
    plan: free
    envVars:
      - key: API_URL
        fromService:
          name: agentmetrics-api
          type: web
          property: host
